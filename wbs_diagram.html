<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WBS — Petals &amp; Pots</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 10px 60px;
  }
  h1 {
    font-size: 18px;
    color: #2D2D2D;
    margin-bottom: 28px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  /* ── Tree structure via CSS ─────────────────────────── */
  .tree, .tree ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  /* the root UL is vertical-center aligned */
  .tree {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Every LI is a node */
  .tree li {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── ROOT node ──────────────────────────────────────── */
  .node {
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    border-radius: 5px;
    font-size: 11px;
    line-height: 1.35;
    font-weight: 600;
    padding: 6px 8px;
    min-width: 100px;
  }
  .node.root {
    background: #3B5249;
    color: #fff;
    font-size: 13px;
    padding: 12px 28px;
    min-width: 180px;
    border-radius: 6px;
  }
  .node.l1 {
    background: #6B8F7B;
    color: #fff;
    font-size: 10px;
    padding: 8px 6px;
    min-width: 110px;
    max-width: 120px;
    min-height: 52px;
  }
  .node.l2 {
    background: #E8E0D0;
    color: #3B3B3B;
    font-size: 9px;
    font-weight: 500;
    padding: 6px 5px;
    min-width: 108px;
    max-width: 118px;
    min-height: 42px;
    border: 1px solid #ccc;
  }

  /* ── Vertical line from root to L1 bus ──────────────── */
  .trunk {
    width: 2px;
    height: 36px;
    background: #7A7A7A;
  }

  /* ── L1 row: horizontal layout ─────────────────────── */
  .l1-row {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    position: relative;
    gap: 0;
  }

  /* Horizontal bus behind L1 nodes */
  .l1-row::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50px;
    right: 50px;
    height: 2px;
    background: #7A7A7A;
  }

  .l1-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 122px;
    margin: 0 2px;
  }

  /* Vertical stub from bus down to L1 box */
  .l1-stub {
    width: 2px;
    height: 24px;
    background: #7A7A7A;
  }

  /* Vertical line from L1 box down to L2 children */
  .l1-to-l2 {
    width: 2px;
    height: 20px;
    background: #7A7A7A;
  }

  /* ── L2 children: stacked vertically ───────────────── */
  .l2-stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  .l2-link {
    width: 2px;
    height: 8px;
    background: #7A7A7A;
  }
</style>
</head>
<body>

<h1>Work Breakdown Structure — Petals &amp; Pots (Full Project)</h1>

<div class="tree">
  <!-- ROOT -->
  <div class="node root">Petals &amp; Pots<br>E-Commerce Platform</div>
  <div class="trunk"></div>

  <!-- L1 ROW -->
  <div class="l1-row" id="l1row"></div>
</div>

<script>
const categories = [
  { name: "Authentication\n& Security", tasks: [
    "Auth Page UI\n(Login / Register)",
    "Supabase Auth\nIntegration",
    "Role-Based\nAccess (RBAC)",
    "Route Guards\n& Redirects"
  ]},
  { name: "Home &\nLanding Page", tasks: [
    "Hero Section\n& Animations",
    "Philosophy &\nBrand Story",
    "Category Shelf\n& Previews",
    "Why Choose Us\nSection"
  ]},
  { name: "Editorial\nCatalogue", tasks: [
    "Catalogue Hero\n& Ficus Spotlight",
    "Anatomy &\nHeritage Sections",
    "Care Guide\nSection",
    "Dynamic Supabase\nData Fetch"
  ]},
  { name: "Discovery\n& Shop", tasks: [
    "Product Grid\n& Cards",
    "Category Filter\nBar",
    "Newsletter\nSubscription",
    "Shop Page\nLayout"
  ]},
  { name: "Product\nDetail", tasks: [
    "Product Layout\n(Images / Info)",
    "Add to Cart\nAction",
    "Care Info\nDisplay"
  ]},
  { name: "Shopping\nCart", tasks: [
    "Cart Context /\nState Mgmt",
    "Cart Items &\nQty Controls",
    "Order Summary\n& Cross-Sell"
  ]},
  { name: "Checkout\n& Orders", tasks: [
    "Checkout Form\n(Shipping / Pay)",
    "Payment Gateway\n(eSewa / Khalti)",
    "Order History\n& Status"
  ]},
  { name: "User\nDashboard", tasks: [
    "Profile Header\n& Details",
    "Recent Orders\nPanel",
    "Logout\nFunctionality"
  ]},
  { name: "Admin Panel\n(Archive)", tasks: [
    "Metrics Grid\n(KPIs)",
    "Inventory Table\n(CRUD)",
    "System Log /\nActivity Feed"
  ]},
  { name: "Inventory\nManagement", tasks: [
    "Add / Edit\nPlant Forms",
    "Image Upload\n(Supabase Storage)",
    "Featured Product\nToggle"
  ]},
  { name: "AI Plant\nDiagnosis", tasks: [
    "Kindwise API\nIntegration",
    "Diagnosis Results\nDisplay",
    "Diagnosis History\nSaving"
  ]},
  { name: "Plant\nJournal", tasks: [
    "Watering Reminder\nCRUD",
    "Scheduling Logic\n(Frequency)",
    "Care Timeline\nDisplay"
  ]},
  { name: "Database &\nBackend", tasks: [
    "10 Supabase\nTables",
    "Row-Level Security\n(RLS) Policies",
    "Supabase Client\n& Config"
  ]},
];

const row = document.getElementById('l1row');

categories.forEach(cat => {
  const col = document.createElement('div');
  col.className = 'l1-col';

  // stub
  const stub = document.createElement('div');
  stub.className = 'l1-stub';
  col.appendChild(stub);

  // L1 box
  const l1 = document.createElement('div');
  l1.className = 'node l1';
  l1.innerHTML = cat.name.replace(/\n/g, '<br>');
  col.appendChild(l1);

  // line from L1 to L2
  const l1tol2 = document.createElement('div');
  l1tol2.className = 'l1-to-l2';
  col.appendChild(l1tol2);

  // L2 stack
  const stack = document.createElement('div');
  stack.className = 'l2-stack';

  cat.tasks.forEach((task, i) => {
    if (i > 0) {
      const link = document.createElement('div');
      link.className = 'l2-link';
      stack.appendChild(link);
    }
    const l2 = document.createElement('div');
    l2.className = 'node l2';
    l2.innerHTML = task.replace(/\n/g, '<br>');
    stack.appendChild(l2);
  });

  col.appendChild(stack);
  row.appendChild(col);
});
</script>
</body>
</html>
